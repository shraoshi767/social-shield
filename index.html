<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Shield AI | Neural Anomaly Detection</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#05070a] text-white overflow-x-hidden">
    <div class="fixed inset-0 z-[-1] bg-[radial-gradient(circle_at_50%_50%,rgba(0,242,255,0.1),transparent_50%)]"></div>
    
    <nav class="flex justify-between items-center p-8 max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
            <i data-lucide="shield-check" class="text-cyan-400 w-8 h-8"></i>
            <span class="text-2xl font-bold tracking-tighter uppercase">SocialShield <span class="text-cyan-400">AI</span></span>
        </div>
        <div class="space-x-8 hidden md:flex">
            <a href="login.html" class="hover:text-cyan-400 transition">Login</a>
            <a href="signup.html" class="bg-cyan-500 text-black px-6 py-2 rounded-full font-bold hover:bg-cyan-400 shadow-[0_0_15px_rgba(6,182,212,0.5)]">Get Started</a>
        </div>
    </nav>

    <header class="text-center py-32 px-4">
        <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tighter">
            THE FUTURE OF <br> <span class="bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">SOCIAL INTEGRITY</span>
        </h1>
        <p class="text-gray-400 max-w-2xl mx-auto text-xl mb-10">
            Enterprise-grade anomaly detection for social platforms. Detect bots, spam, and coordinated attacks with neural pattern recognition.
        </p>
        <div class="flex flex-col md:flex-row justify-center gap-4">
            <a href="signup.html" class="bg-white text-black px-10 py-4 rounded-xl font-bold text-lg hover:bg-cyan-400 transition">Launch Dashboard</a>
            <button class="border border-white/20 px-10 py-4 rounded-xl font-bold text-lg hover:bg-white/10 transition">View Documentation</button>
        </div>
    </header>

    <script>lucide.createIcons();</script>
</body>
</html>
