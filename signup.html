<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Social Shield AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#05070a] text-white h-screen flex items-center justify-center p-6">
    
    <div class="glass w-full max-w-md p-10 space-y-8 neon-border">
        <div class="text-center">
            <h2 class="text-3xl font-bold tracking-tighter">REGISTER AGENT</h2>
            <p class="text-gray-400 mt-2">Initialize your analyst credentials</p>
        </div>

        <form id="signupForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-400 transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                <input type="password" id="password" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-400 transition">
            </div>
            <button type="submit" class="w-full bg-purple-600 text-white font-bold py-3 rounded-xl hover:bg-purple-500 shadow-[0_0_20px_rgba(188,19,254,0.3)] transition transform hover:scale-[1.02]">
                INITIALIZE ACCOUNT
            </button>
        </form>

        <div class="text-center text-sm">
            <span class="text-gray-500">Already registered?</span>
            <a href="login.html" class="text-purple-400 hover:underline ml-1">Secure Login</a>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
